<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>体育赛事 DDL · Just-DDL Network</title><meta name="description" content="体育赛事、报名节点和赛历倒计时，重点覆盖乒乓球、羽毛球、马拉松与田径。"><style>
:root{--accent:#0EA5E9;--ink:#0f172a;--muted:#64748b;--line:#dbe3ef;--soft:#f8fafc;--paper:#fff}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:var(--ink);background:linear-gradient(180deg,#f8fbff 0%,#f0fdfa 100%);letter-spacing:0}header{position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(16px)}.nav,main,footer{width:min(1180px,calc(100% - 32px));margin:0 auto}.nav{height:66px;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:10px;font-weight:900;color:var(--ink);text-decoration:none}.dot{width:12px;height:12px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 8px color-mix(in srgb,var(--accent) 14%,transparent)}.links{display:flex;gap:10px;flex-wrap:wrap}.links a,.button{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 14px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:800;text-decoration:none}.hero{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(320px,.92fr);gap:28px;padding:54px 0 28px;align-items:stretch}.eyebrow{display:inline-flex;gap:8px;align-items:center;font-size:14px;font-weight:900;color:var(--accent)}h1{font-size:clamp(42px,7vw,76px);line-height:.98;margin:16px 0 18px;letter-spacing:0}.lead{font-size:19px;line-height:1.72;color:#43506a;max-width:780px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:28px}.stat,.board,.event,.subtopic{background:var(--paper);border:1px solid var(--line);border-radius:8px;box-shadow:0 16px 45px rgba(15,23,42,.06)}.stat{padding:18px;min-height:92px}.stat strong{display:block;font-size:28px}.stat span{color:var(--muted);font-weight:700}.board{padding:22px;background:linear-gradient(135deg,#fff 0%,color-mix(in srgb,var(--accent) 11%,#fff) 100%)}.board h2{margin:0 0 16px;font-size:22px}.subtopics{display:grid;gap:10px}.subtopic{padding:12px;background:rgba(255,255,255,.75)}.subtopic button{width:100%;display:flex;align-items:center;justify-content:space-between;border:0;background:transparent;padding:0;color:var(--ink);font-weight:900;font:inherit;cursor:pointer;text-align:left}.meta,.desc{color:var(--muted);line-height:1.55}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin:24px 0 16px;flex-wrap:wrap}.toolbar h2{margin:0;font-size:28px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;padding-bottom:52px}.event{padding:18px;min-height:280px;display:flex;flex-direction:column;gap:14px}.event h3{margin:0;font-size:19px;line-height:1.35}.countdown{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.unit{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:10px}.unit strong{display:block;font-size:22px}.unit span{color:var(--muted);font-size:13px;font-weight:800}.tags{display:flex;gap:8px;flex-wrap:wrap}.tag{border-radius:999px;padding:6px 10px;background:color-mix(in srgb,var(--accent) 12%,#fff);color:#27344b;font-weight:800;font-size:12px}.event a.button{margin-top:auto;background:var(--accent);color:#fff;border-color:transparent}footer{color:var(--muted);padding:26px 0 48px;border-top:1px solid var(--line);text-align:center}.mini{margin-top:6px;color:#0f766e;font-weight:900}@media(max-width:920px){.hero{grid-template-columns:1fr;padding-top:36px}.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr}}
</style></head><body><header><nav class="nav"><a class="brand" href="https://just-agent.github.io/just-ddl/"><span class="dot"></span> JUST-DDL NETWORK</a><div class="links"><a href="https://just-agent.github.io/just-ddl/#/topic/sports-ddl">Hub</a><a href="https://github.com/Just-Agent/sports-ddl">GitHub</a></div></nav></header><main><section class="hero"><div><div class="eyebrow">独立专题仓库 · 体育赛事</div><h1>体育赛事</h1><p class="lead">体育赛事、报名节点和赛历倒计时，重点覆盖乒乓球、羽毛球、马拉松与田径。每条事件都显示倒计时，并保留来源入口，方便后续 crawler 自动校验。</p><div class="stats"><div class="stat"><strong id="itemCount">-</strong><span>活跃条目</span></div><div class="stat"><strong>5</strong><span>来源族</span></div><div class="stat"><strong id="nextDays">-</strong><span>下一条</span></div></div></div><aside class="board"><h2>子专题小广场</h2><div class="subtopics" id="subtopics"></div></aside></section><div class="toolbar"><h2>全部截止日</h2><div class="meta">按截止时间升序排列 · 数据以官方来源页面为准</div></div><section class="grid" id="events"></section></main><footer>体育赛事 DDL is part of Just-DDL Network.<div class="mini">微信小程序版本即将上线，敬请期待</div></footer><script>
let items=[];let selected='all';const formatter=new Intl.DateTimeFormat('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'});function diffParts(deadline){const ms=new Date(deadline)-new Date();const positive=Math.max(0,ms);return{days:Math.floor(positive/86400000),hours:Math.floor((positive%86400000)/3600000),minutes:Math.floor((positive%3600000)/60000),ended:ms<0}}function htmlEscape(value){return String(value||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;')}function renderSubtopics(){const root=document.getElementById('subtopics');const groups=[...items.reduce((map,item)=>{const id=item.subtopic||'other';const name=item.subtopicName||'其他赛事';const list=map.get(id)||{id,name,items:[]};list.items.push(item);map.set(id,list);return map},new Map()).values()];root.innerHTML='<div class="subtopic"><button data-id="all"><span>全部体育</span><strong>'+items.length+'</strong></button></div>'+groups.map(g=>'<div class="subtopic"><button data-id="'+htmlEscape(g.id)+'"><span>'+htmlEscape(g.name)+'</span><strong>'+g.items.length+'</strong></button></div>').join('');root.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{selected=btn.dataset.id||'all';render()}))}function render(){const root=document.getElementById('events');const filtered=items.filter(item=>selected==='all'||item.subtopic===selected).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));if(!filtered.length){root.innerHTML='<article class="event"><h3>暂无可展示条目</h3><div class="desc">数据文件暂不可用，请稍后刷新。</div></article>';document.getElementById('itemCount').textContent='0';return}root.innerHTML=filtered.map(item=>{const diff=diffParts(item.deadline);const tags=(item.tags||[]).map(tag=>'<span class="tag">'+htmlEscape(tag)+'</span>').join('');return '<article class="event"><div class="meta">'+htmlEscape(item.subtopicName||'体育')+' · '+htmlEscape(item.stage||'Deadline')+' · '+formatter.format(new Date(item.deadline))+'</div><h3>'+htmlEscape(item.title)+'</h3><div class="countdown"><div class="unit"><strong>'+diff.days+'</strong><span>天</span></div><div class="unit"><strong>'+diff.hours+'</strong><span>小时</span></div><div class="unit"><strong>'+diff.minutes+'</strong><span>分钟</span></div></div><div class="desc">'+htmlEscape(item.description||'')+'</div><div class="tags">'+tags+'</div><div class="meta">来源：'+htmlEscape(item.source||'source page')+'</div><a class="button" href="'+htmlEscape(encodeURI(item.url))+'">查看来源</a></article>'}).join('');document.getElementById('itemCount').textContent=String(filtered.length);const next=filtered.find(item=>new Date(item.deadline)>=new Date())||filtered[0];if(next)document.getElementById('nextDays').textContent=diffParts(next.deadline).days+' 天后'}async function loadItems(){try{const response=await fetch('data/items.json',{cache:'no-store'});if(response.ok){const fresh=await response.json();if(Array.isArray(fresh)&&fresh.length)items=fresh}}catch{}renderSubtopics();render()}loadItems();setInterval(render,60000);
</script></body></html>
