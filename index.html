icon":"乒","color":"#F97316","bg":"#FFF7ED","note":"ITTF / WTT 职业赛历"},"basketball":{"name":"篮球","icon":"篮","color":"#EA580C","bg":"#FFEDD5","note":"NBA Finals 与 FIBA 世界杯"},"billiards":{"name":"台球","icon":"台","color":"#0F766E","bg":"#CCFBF1","note":"Pool / Snooker 赛事入口"},"pickleball":{"name":"匹克球","icon":"匹","color":"#7C3AED","bg":"#F3E8FF","note":"PPA / MLP 巡回赛"},"running-athletics":{"name":"路跑与田径","icon":"跑","color":"#16A34A","bg":"#DCFCE7","note":"马拉松与 World Athletics"},"other":{"name":"其他体育","icon":"赛","color":"#64748B","bg":"#F1F5F9","note":"其他赛事节点"}};const formatter=new Intl.DateTimeFormat('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'});function diffParts(deadline){const ms=new Date(deadline)-new Date();const positive=Math.max(0,ms);return{days:Math.floor(positive/86400000),hours:Math.floor((positive%86400000)/3600000),minutes:Math.floor((positive%3600000)/60000),ended:ms<0}}function htmlEscape(value){return String(value||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;")}function styleFor(item){return styles[item.subtopic]||styles.other}function stageKind(stage){const value=String(stage||'').toLowerCase();if(value.includes('qualifier')||value.includes('ranking'))return '资格/排名';if(value.includes('final'))return '决赛';if(value.includes('race'))return '比赛日';if(value.includes('window')||value.includes('title'))return '项目窗口';return '开赛'}function domain(url){try{return new URL(url).hostname.replace(/^www\./,'')}catch{return url}}function renderSubtopics(){const root=document.getElementById('subtopics');const groups=[...items.reduce((map,item)=>{const id=item.subtopic||'other';const style=styleFor(item);const list=map.get(id)||{id,style,items:[]};list.items.push(item);map.set(id,list);return map},new Map()).values()];root.innerHTML='<div class="subtopic"><button data-id="all"><span><span style="color:var(--accent)">●</span> 全部<small>所有项目交叉显示</small></span><strong>'+items.length+'</strong></button></div>'+groups.map(g=>'<div class="subtopic"><button data-id="'+htmlEscape(g.id)+'"><span><span style="color:'+g.style.color+'">●</span> '+htmlEscape(g.style.name)+'<small>'+htmlEscape(g.style.note)+'</small></span><strong>'+g.items.length+'</strong></button></div>').join('');root.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{selected=btn.dataset.id||'all';render()}))}function render(){const root=document.getElementById('events');const filtered=items.filter(item=>selected==='all'||item.subtopic===selected).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));if(!filtered.length){root.innerHTML='<article class="event"><div class="event-body"><h3>暂无可展示条目</h3><div class="desc">数据文件暂不可用，请稍后刷新。</div></div></article>';document.getElementById('itemCount').textContent='0';return}root.innerHTML=filtered.map(item=>{const diff=diffParts(item.deadline);const style=styleFor(item);const tags=(item.tags||[]).map(tag=>'<span class="tag">'+htmlEscape(tag)+'</span>').join('');const source=htmlEscape(item.source||domain(item.url));return '<article class="event"><div class="thumb" style="background:linear-gradient(135deg,'+style.color+', color-mix(in srgb,'+style.color+' 72%, #0f172a))"><span class="mark">'+htmlEscape(style.icon)+'</span><span class="source-chip">'+source+'</span></div><div class="event-body"><div class="meta">'+htmlEscape(style.name)+' · '+htmlEscape(stageKind(item.stage))+' · '+formatter.format(new Date(item.deadline))+'</div><h3>'+htmlEscape(item.title)+'</h3><div class="countdown"><div class="unit"><strong>'+diff.days+'</strong><span>天</span></div><div class="unit"><strong>'+diff.hours+'</strong><span>小时</span></div><div class="unit"><strong>'+diff.minutes+'</strong><span>分钟</span></div></div><div class="desc">'+htmlEscape(item.description||'')+'</div><div class="tags">'+tags+'</div><a class="button" style="background:'+style.color+'" href="'+htmlEscape(encodeURI(item.url))+'">查看来源</a></div></article>'}).join('');document.getElementById('itemCount').textContent=String(filtered.length);const next=filtered.find(item=>new Date(item.deadline)>=new Date())||filtered[0];if(next)document.getElementById('nextDays').textContent=diffParts(next.deadline).days+' 天后'}async function loadItems(){items=seed;try{const response=await fetch('data/items.json',{cache:'no-store'});if(response.ok){const fresh=await response.json();if(Array.isArray(fresh)&&fresh.length)items=fresh}}catch{}renderSubtopics();render()}loadItems();setInterval(render,60000);
</script>
