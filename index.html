<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>体育赛事 DDL · Just-DDL Network</title>
<meta name="description" content="乒乓球、羽毛球、篮球、台球、匹克球、路跑与田径的赛事倒计时和官方来源追踪。">
<style>
:root{--accent:#0ea5e9;--accent2:#14b8a6;--ink:#081225;--muted:#5d6b82;--line:#dbe5f2;--soft:#f6f9fc;--paper:#fff}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:var(--ink);background:linear-gradient(180deg,#f7fbff 0%,#f8fafc 50%,#ecfeff 100%);letter-spacing:0}
header{position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(16px)}.nav,main,footer{width:min(1180px,calc(100% - 32px));margin:0 auto}.nav{height:66px;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:10px;font-weight:950;color:var(--ink);text-decoration:none}.dot{width:12px;height:12px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 8px color-mix(in srgb,var(--accent) 14%,transparent)}
.links,.view-toggle{display:flex;gap:8px;flex-wrap:wrap}.links a,.button,.view-toggle button{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 14px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:850;text-decoration:none;cursor:pointer}.view-toggle{padding:4px;border:1px solid var(--line);border-radius:14px;background:#fff}.view-toggle button{min-height:34px;border:0;background:transparent;color:var(--muted)}.view-toggle button.active{background:var(--accent);color:#fff}
.hero{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(320px,.92fr);gap:28px;padding:54px 0 28px;align-items:stretch}.eyebrow{display:inline-flex;gap:8px;align-items:center;font-size:14px;font-weight:900;color:var(--accent)}h1{font-size:clamp(42px,7vw,76px);line-height:.98;margin:16px 0 18px}.lead{font-size:19px;line-height:1.72;color:#43506a;max-width:780px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:28px}.stat,.board,.event-card,.subtopic{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 16px 45px rgba(15,23,42,.06)}.stat{padding:18px;min-height:92px}.stat strong{display:block;font-size:28px}.stat span{color:var(--muted);font-weight:760}
.board{padding:22px;background:linear-gradient(135deg,#fff 0%,color-mix(in srgb,var(--accent) 10%,#fff) 100%)}.board h2{margin:0 0 16px;font-size:22px}.subtopics{display:grid;gap:10px}.subtopic{padding:12px;background:rgba(255,255,255,.8);border-radius:14px}.subtopic button{width:100%;display:flex;align-items:center;justify-content:space-between;border:0;background:transparent;padding:0;color:var(--ink);font-weight:900;font:inherit;cursor:pointer;text-align:left}.subtopic small{display:block;color:var(--muted);font-weight:700;margin-top:3px}.subtopic.active{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 10%,transparent)}
.meta,.desc{color:var(--muted);line-height:1.55}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin:24px 0 16px;flex-wrap:wrap}.toolbar h2{margin:0;font-size:28px}.toolbar-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}.pill{border-radius:999px;padding:8px 12px;background:#e0f2fe;color:#0369a1;font-weight:900;font-size:13px}
.events{padding-bottom:52px}.events.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.events.list{display:grid;gap:14px}.event-card{overflow:hidden;display:flex;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease}.event-card:hover{transform:translateY(-2px);box-shadow:0 22px 60px rgba(14,165,233,.14);border-color:color-mix(in srgb,var(--tone) 38%,var(--line))}.events.grid .event-card{min-height:430px;flex-direction:column}.events.list .event-card{min-height:190px;flex-direction:row}
.preview{position:relative;isolation:isolate;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding:18px;color:#fff;text-decoration:none;background:linear-gradient(135deg,var(--tone),color-mix(in srgb,var(--tone) 62%,#0f172a));overflow:hidden}.events.grid .preview{min-height:164px}.events.list .preview{width:300px;min-width:300px}.preview img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;transition:transform .55s ease}.event-card:hover .preview img{transform:scale(1.04)}.preview:after{content:"";position:absolute;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(8,18,37,.06),rgba(8,18,37,.72))}.sport-mark{font-size:34px;font-weight:950;letter-spacing:0}.source-badge{max-width:100%;border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.9);color:#0f172a;font-size:12px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.open-dot{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,.9);color:var(--tone);font-weight:950}
.event-body{display:flex;flex:1;flex-direction:column;gap:13px;padding:18px}.event-kicker{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;font-weight:900;color:var(--muted)}.stage-chip{border-radius:999px;padding:4px 9px;background:color-mix(in srgb,var(--tone) 12%,#fff);color:var(--tone)}.event-card h3{margin:0;font-size:20px;line-height:1.32}.countdown{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.unit{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:10px}.unit strong{display:block;font-size:22px}.unit span{color:var(--muted);font-size:13px;font-weight:800}.tags{display:flex;gap:8px;flex-wrap:wrap}.tag{border-radius:999px;padding:6px 10px;background:color-mix(in srgb,var(--tone) 10%,#fff);color:#27344b;font-weight:800;font-size:12px}.event-actions{margin-top:auto;display:flex;gap:10px;align-items:center}.event-actions .button{background:var(--tone);border-color:transparent;color:#fff}.event-actions .ghost{background:#fff;color:var(--ink);border-color:var(--line)}
footer{color:var(--muted);padding:26px 0 48px;border-top:1px solid var(--line);text-align:center}.mini{margin-top:6px;color:#0f766e;font-weight:900}
@media(max-width:980px){.hero{grid-template-columns:1fr;padding-top:36px}.events.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.events.list .event-card{flex-direction:column}.events.list .preview{width:100%;min-width:0;min-height:160px}.stats{grid-template-columns:1fr}}
@media(max-width:640px){.events.grid{grid-template-columns:1fr}.nav{height:auto;padding:12px 0;align-items:flex-start;flex-direction:column}.toolbar{align-items:flex-start}.toolbar-actions{width:100%}.view-toggle{width:100%}.view-toggle button{flex:1}.countdown{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<header>
  <nav class="nav">
    <a class="brand" href="https://just-agent.github.io/just-ddl/"><span class="dot"></span> JUST-DDL NETWORK</a>
    <div class="links">
      <a href="https://just-agent.github.io/just-ddl/#/topic/sports-ddl">Hub</a>
      <a href="https://github.com/Just-Agent/sports-ddl">GitHub</a>
    </div>
  </nav>
</header>
<main>
  <section class="hero">
    <div>
      <div class="eyebrow">独立专题仓库 · 体育赛事 DDL</div>
      <h1>体育赛事</h1>
      <p class="lead">乒乓球、羽毛球、篮球、台球、匹克球、路跑与田径的赛事倒计时和官方来源追踪。每条事件都显示倒计时，并通过项目颜色、来源预览和官方链接区分不同赛事。</p>
      <div class="stats">
        <div class="stat"><strong id="itemCount">-</strong><span>活跃条目</span></div>
        <div class="stat"><strong id="sourceCount">-</strong><span>来源族</span></div>
        <div class="stat"><strong id="nextDays">-</strong><span>下一条</span></div>
      </div>
    </div>
    <aside class="board">
      <h2>子专题小广场</h2>
      <div class="subtopics" id="subtopics"></div>
    </aside>
  </section>

  <div class="toolbar">
    <div>
      <h2>全部截止日</h2>
      <div class="meta">按截止时间升序排列 · 数据以官方/主办方页面为准</div>
    </div>
    <div class="toolbar-actions">
      <span class="pill" id="filterLabel">全部项目</span>
      <div class="view-toggle" aria-label="展示方式">
        <button type="button" data-view="list">列表</button>
        <button type="button" data-view="grid">格子</button>
      </div>
    </div>
  </div>
  <section class="events grid" id="events"></section>
</main>
<footer>
  体育赛事 DDL is part of Just-DDL Network.
  <div class="mini">微信小程序版本即将上线，敬请期待</div>
  <div>数据仅供参考，请以官方信息为准。</div>
</footer>
<script>
let items = [];
let selected = 'all';
let viewMode = localStorage.getItem('sports-ddl-view-mode') || 'grid';

const styles = {
  badminton: { name: '羽毛球', icon: '羽', color: '#0EA5E9', note: 'BWF 世界巡回赛与公开赛' },
  'table-tennis': { name: '乒乓球', icon: '乒', color: '#F97316', note: 'ITTF / WTT 职业赛历' },
  basketball: { name: '篮球', icon: '篮', color: '#EA580C', note: 'NBA Finals 与 FIBA 世界杯' },
  billiards: { name: '台球', icon: '台', color: '#0F766E', note: 'Pool / Snooker 赛事入口' },
  pickleball: { name: '匹克球', icon: '匹', color: '#7C3AED', note: 'PPA / MLP 巡回赛' },
  'running-athletics': { name: '路跑与田径', icon: '跑', color: '#16A34A', note: '马拉松与 World Athletics' },
  other: { name: '其他体育', icon: '赛', color: '#64748B', note: '其他赛事节点' },
};

const formatter = new Intl.DateTimeFormat('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });

function diffParts(deadline) {
  const ms = new Date(deadline) - new Date();
  const positive = Math.max(0, ms);
  return {
    days: Math.floor(positive / 86400000),
    hours: Math.floor((positive % 86400000) / 3600000),
    minutes: Math.floor((positive % 3600000) / 60000),
    ended: ms < 0,
  };
}

function htmlEscape(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function styleFor(item) {
  return styles[item.subtopic] || styles.other;
}

function stageKind(stage) {
  const value = String(stage || '').toLowerCase();
  if (value.includes('final')) return '决赛';
  if (value.includes('race')) return '比赛日';
  if (value.includes('registration')) return '报名';
  return '开赛';
}

function domain(url) {
  try {
    return new URL(url).hostname.replace(/^www\./, '');
  } catch {
    return url || 'official source';
  }
}

function sourcePreviewFor(item) {
  const sourceUrl = String(item.sourceUrl || item.url || '');
  if (item.previewImage) return item.previewImage;
  if (sourceUrl.includes('bwfbadminton.com/calendar')) return 'docs/assets/source-previews/bwf-calendar.png';
  return '';
}

function renderSubtopics() {
  const root = document.getElementById('subtopics');
  const groups = [...items.reduce((map, item) => {
    const id = item.subtopic || 'other';
    const style = styleFor(item);
    const list = map.get(id) || { id, style, items: [] };
    list.items.push(item);
    map.set(id, list);
    return map;
  }, new Map()).values()];

  root.innerHTML = [
    { id: 'all', style: { name: '全部', color: 'var(--accent)', note: '所有项目交叉显示' }, items },
    ...groups,
  ].map(group => `
    <div class="subtopic ${selected === group.id ? 'active' : ''}">
      <button data-id="${htmlEscape(group.id)}">
        <span><span style="color:${group.style.color}">●</span> ${htmlEscape(group.style.name)}<small>${htmlEscape(group.style.note)}</small></span>
        <strong>${group.items.length}</strong>
      </button>
    </div>
  `).join('');

  root.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
    selected = btn.dataset.id || 'all';
    renderSubtopics();
    render();
  }));
}

function renderViewToggle() {
  document.querySelectorAll('[data-view]').forEach(button => {
    button.classList.toggle('active', button.dataset.view === viewMode);
    button.onclick = () => {
      viewMode = button.dataset.view || 'grid';
      localStorage.setItem('sports-ddl-view-mode', viewMode);
      render();
    };
  });
}

function render() {
  renderViewToggle();
  const root = document.getElementById('events');
  const filtered = items
    .filter(item => selected === 'all' || item.subtopic === selected)
    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

  root.className = `events ${viewMode}`;
  document.getElementById('filterLabel').textContent = selected === 'all' ? '全部项目' : (styles[selected]?.name || '其他体育');

  if (!filtered.length) {
    root.innerHTML = '<article class="event-card"><div class="event-body"><h3>暂无可展示条目</h3><div class="desc">数据文件暂不可用，请稍后刷新。</div></div></article>';
    document.getElementById('itemCount').textContent = '0';
    return;
  }

  root.innerHTML = filtered.map(item => {
    const diff = diffParts(item.deadline);
    const style = styleFor(item);
    const tags = (item.tags || []).map(tag => `<span class="tag">${htmlEscape(tag)}</span>`).join('');
    const source = htmlEscape(item.source || domain(item.url));
    const preview = sourcePreviewFor(item);
    const previewMedia = preview
      ? `<img src="${htmlEscape(preview)}" alt="${source} 页面预览" loading="lazy">`
      : `<span class="sport-mark">${htmlEscape(style.icon)}</span>`;

    return `
      <article class="event-card" style="--tone:${style.color}">
        <a class="preview" href="${htmlEscape(item.url)}" target="_blank" rel="noopener noreferrer">
          ${previewMedia}
          <span class="source-badge">${source}</span>
          <span class="open-dot">↗</span>
        </a>
        <div class="event-body">
          <div class="event-kicker">
            <span>${htmlEscape(style.name)}</span>
            <span class="stage-chip">${htmlEscape(stageKind(item.stage))}</span>
            <span>${formatter.format(new Date(item.deadline))}</span>
          </div>
          <h3>${htmlEscape(item.title)}</h3>
          <div class="countdown">
            <div class="unit"><strong>${diff.days}</strong><span>天</span></div>
            <div class="unit"><strong>${diff.hours}</strong><span>小时</span></div>
            <div class="unit"><strong>${diff.minutes}</strong><span>分钟</span></div>
          </div>
          <div class="desc">${htmlEscape(item.description || '')}</div>
          <div class="tags">${tags}</div>
          <div class="event-actions">
            <a class="button" href="${htmlEscape(item.url)}" target="_blank" rel="noopener noreferrer">查看官方来源 ↗</a>
            <a class="button ghost" href="${htmlEscape(item.sourceUrl || item.url)}" target="_blank" rel="noopener noreferrer">来源页</a>
          </div>
        </div>
      </article>
    `;
  }).join('');

  const activeItems = items.filter(item => item.status !== 'ended');
  const sources = new Set(items.map(item => item.source).filter(Boolean));
  const next = activeItems.find(item => new Date(item.deadline) >= new Date()) || filtered[0];
  document.getElementById('itemCount').textContent = String(activeItems.length);
  document.getElementById('sourceCount').textContent = String(sources.size);
  document.getElementById('nextDays').textContent = next ? `${diffParts(next.deadline).days} 天后` : '-';
}

async function loadItems() {
  try {
    const response = await fetch('data/items.json', { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const fresh = await response.json();
    if (Array.isArray(fresh)) items = fresh;
  } catch (error) {
    console.error(error);
    items = [];
  }
  renderSubtopics();
  render();
}

loadItems();
setInterval(render, 60000);
</script>
</body>
</html>
